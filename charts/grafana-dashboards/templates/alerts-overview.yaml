apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-alerts-overview
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "grafana-dashboards.labels" . | nindent 4 }}
    jenkins-x.io/grafana-dashboard: "1"
  annotations:
    grafana_folder: {{ .Values.folder }}
data:
  alerts-overview.json: |-
{{ .Files.Get "files/alerts-overview.json" | indent 4 }}
