apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-pvc-pod-node
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "grafana-dashboards.labels" . | nindent 4 }}
    jenkins-x.io/grafana-dashboard: "1"
  annotations:
    grafana_folder: {{ .Values.folder }}
data:
  pvc-pod-node.json: |-
{{ .Files.Get "files/pvc-pod-node.json" | indent 4 }}
