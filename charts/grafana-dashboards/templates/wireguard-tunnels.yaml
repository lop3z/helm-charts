    {{- include "grafana-dashboards.labels" . | nindent 4 }}
    jenkins-x.io/grafana-dashboard: "1"
  annotations:
    grafana_folder: Network
data:
  wireguard-tunnels.json: |-
{{ .Files.Get "files/wireguard-tunnels.json" | indent 4 }}
