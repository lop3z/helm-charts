apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hyperping-exporter.fullname" . }}
  labels:
    {{- include "hyperping-exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hyperping-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hyperping-exporter.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: exporter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --listen-address=:{{ .Values.config.port }}
            - --cache-ttl={{ .Values.config.cacheTTL }}
            - --log-level={{ .Values.config.logLevel }}
            - --log-format={{ .Values.config.logFormat }}
            - --namespace={{ .Values.config.namespace }}
          env:
            - name: HYPERPING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKey.existingSecret | default (include "hyperping-exporter.fullname" .) }}
                  key: {{ .Values.apiKey.existingSecretKey }}
          ports:
            - name: metrics
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
