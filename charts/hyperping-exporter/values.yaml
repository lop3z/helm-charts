image:
  repository: khaledsalhabdeveleap/hyperping-exporter
  tag: "1.0.1"
  pullPolicy: IfNotPresent

replicaCount: 1

# API key configuration — use existingSecret to reference a Vault-injected K8s Secret
apiKey:
  # Inline value (not recommended for production)
  value: ""
  # Reference an existing secret
  existingSecret: ""
  existingSecretKey: "HYPERPING_API_KEY"

# Exporter configuration
config:
  port: 9312
  cacheTTL: "60s"
  logLevel: "info"
  logFormat: "json"
  # Metric name prefix
  namespace: "hyperping"

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

serviceMonitor:
  enabled: true
  interval: "60s"
  # Additional labels to add to the ServiceMonitor (e.g. to match Alloy/Prometheus selector)
  labels: {}

nodeSelector: {}
tolerations: []
affinity: {}
