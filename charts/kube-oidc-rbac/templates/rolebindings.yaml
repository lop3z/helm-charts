{{- range .Values.namespaceBindings }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .group }}
  namespace: {{ .namespace }}
subjects:
  - kind: Group
    name: {{ $.Values.groupsPrefix }}{{ .group }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: {{ .role }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}

{{- range .Values.managedNamespaces }}
{{- $ns := . }}
{{- $prefix := $.Values.clusterPrefix }}
{{- range list
  (dict "group" (printf "%s-%s-view" $prefix $ns)         "role" "namespace-view" "namespace" $ns)
  (dict "group" (printf "%s-%s-secrets-view" $prefix $ns) "role" "secrets-view"   "namespace" $ns)
  (dict "group" (printf "%s-%s-edit" $prefix $ns)         "role" "edit"           "namespace" $ns)
}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .group }}
  namespace: {{ .namespace }}
subjects:
  - kind: Group
    name: {{ $.Values.groupsPrefix }}{{ .group }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: {{ .role }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
