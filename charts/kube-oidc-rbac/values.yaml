# Prefix prepended to group names to form the Kubernetes group subject.
# Must match the groupsPrefix configured on the cluster OIDC provider.
groupsPrefix: "oidc:"

# Cluster-wide bindings (ClusterRoleBinding).
# - group: OIDC group name (without prefix)
# - clusterRole: Kubernetes ClusterRole to bind to
clusterBindings: []

# Namespace-scoped bindings — generates view/secrets-view/edit RoleBindings
# for every namespace listed, using the clusterPrefix naming convention:
#   {clusterPrefix}-{namespace}-view         → namespace-view
#   {clusterPrefix}-{namespace}-secrets-view → secrets-view
#   {clusterPrefix}-{namespace}-edit         → edit
# clusterPrefix: "k8s-bhs5"
clusterPrefix: ""
managedNamespaces: []
