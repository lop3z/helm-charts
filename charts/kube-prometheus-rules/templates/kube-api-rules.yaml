{{- if .Values.rules.kubeApi.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-kube-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-prometheus-rules.labels" . | nindent 4 }}
    gitops.jenkins-x.io/pipeline: namespaces
spec:
  groups:
  - name: kubernetes.api
    rules:
    - alert: KubeAPILatencyHigh
      annotations:
        description: >
          Kubernetes API server p99 latency for {{ "{{" }} $labels.verb {{ "}}" }}
          {{ "{{" }} $labels.resource {{ "}}" }} is {{ "{{" }} printf "%.2f" $value {{ "}}" }}s
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
        summary: Kubernetes API server p99 latency high ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.kubeApi.latencyHigh | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        histogram_quantile(0.99,
          sum by (cluster_region, verb, resource, le) (
            rate(apiserver_request_duration_seconds_bucket{
              verb!~"WATCH|CONNECT"
            }[5m])
          )
        ) > {{ .Values.rules.kubeApi.latencyWarningSeconds }}
      for: 5m
      labels:
        severity: warning

    - alert: KubeAPILatencyHigh
      annotations:
        description: >
          Kubernetes API server p99 latency for {{ "{{" }} $labels.verb {{ "}}" }}
          {{ "{{" }} $labels.resource {{ "}}" }} is {{ "{{" }} printf "%.2f" $value {{ "}}" }}s
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
          Immediate action required.
        summary: Kubernetes API server p99 latency critical ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.kubeApi.latencyHigh | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        histogram_quantile(0.99,
          sum by (cluster_region, verb, resource, le) (
            rate(apiserver_request_duration_seconds_bucket{
              verb!~"WATCH|CONNECT"
            }[5m])
          )
        ) > {{ .Values.rules.kubeApi.latencyCriticalSeconds }}
      for: 5m
      labels:
        severity: wip

    - alert: KubeAPIErrorRatioHigh
      annotations:
        description: >
          Kubernetes API server error ratio is {{ "{{" }} printf "%.2f" $value {{ "}}" }}%
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
        summary: Kubernetes API server error ratio high ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.kubeApi.errorRatioHigh | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        (
          sum by (cluster_region) (rate(apiserver_request_total{code=~"5.."}[5m]))
          /
          sum by (cluster_region) (rate(apiserver_request_total[5m]))
        ) * 100 > {{ .Values.rules.kubeApi.errorRatioWarning }}
      for: 5m
      labels:
        severity: warning

    - alert: KubeAPIErrorRatioHigh
      annotations:
        description: >
          Kubernetes API server error ratio is {{ "{{" }} printf "%.2f" $value {{ "}}" }}%
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
          Immediate action required.
        summary: Kubernetes API server error ratio critical ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.kubeApi.errorRatioHigh | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        (
          sum by (cluster_region) (rate(apiserver_request_total{code=~"5.."}[5m]))
          /
          sum by (cluster_region) (rate(apiserver_request_total[5m]))
        ) * 100 > {{ .Values.rules.kubeApi.errorRatioCritical }}
      for: 5m
      labels:
        severity: wip

    - alert: KubeJobFailed
      annotations:
        description: >
          Job {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.job_name {{ "}}" }}
          has {{ "{{" }} printf "%.0f" $value {{ "}}" }} failed pods on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
        summary: Kubernetes Job has failures ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.kubeApi.jobFailed | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        sum by (cluster_region, namespace, job_name) (
          increase(kube_job_status_failed[30m])
        ) >= {{ .Values.rules.kubeApi.jobFailedWarning }}
      for: 0m
      labels:
        severity: warning

    - alert: KubeJobFailed
      annotations:
        description: >
          Job {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.job_name {{ "}}" }}
          has {{ "{{" }} printf "%.0f" $value {{ "}}" }} failed pods on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
          Immediate action required.
        summary: Kubernetes Job has critical failures ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.kubeApi.jobFailed | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        sum by (cluster_region, namespace, job_name) (
          increase(kube_job_status_failed[30m])
        ) >= {{ .Values.rules.kubeApi.jobFailedCritical }}
      for: 0m
      labels:
        severity: wip

    # Lateness = time() - next_schedule_time. Negative when on schedule (next run still in future),
    # positive when overdue. Period-agnostic — works for hourly, daily, monthly cronjobs.
    - alert: KubeCronJobMissedSchedule
      annotations:
        description: >
          CronJob {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.cronjob {{ "}}" }}
          is {{ "{{" }} printf "%.0f" $value {{ "}}" }}s past its scheduled run time
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
        summary: CronJob missed schedule ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.kubeApi.cronJobMissedSchedule | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        time() - kube_cronjob_next_schedule_time
          > {{ .Values.rules.kubeApi.cronJobLateWarningSeconds }}
      for: 0m
      labels:
        severity: warning

    - alert: KubeCronJobMissedSchedule
      annotations:
        description: >
          CronJob {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.cronjob {{ "}}" }}
          is {{ "{{" }} printf "%.0f" $value {{ "}}" }}s past its scheduled run time
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
          Immediate action required.
        summary: CronJob missed schedule critically overdue ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.kubeApi.cronJobMissedSchedule | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        time() - kube_cronjob_next_schedule_time
          > {{ .Values.rules.kubeApi.cronJobLateCriticalSeconds }}
      for: 0m
      labels:
        severity: wip
{{- end }}
