{{- if .Values.rules.targets.enabled }}
{{- $sevWarn := ternary "wip_warning" "warning" .Values.rules.targets.warningSuppressed }}
{{- $sevCrit := ternary "wip_critical" "critical" .Values.rules.targets.criticalSuppressed }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-targets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-prometheus-rules.labels" . | nindent 4 }}
    gitops.jenkins-x.io/pipeline: namespaces
spec:
  groups:
  - name: kubernetes.targets
    rules:
    - alert: KubeScrapeTargetDown
      annotations:
        description: >
          Scrape target {{ "{{" }} $labels.job {{ "}}" }} instance {{ "{{" }} $labels.instance {{ "}}" }}
          is down on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
        summary: Scrape target down ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.targets.scrapeTargetDown | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        up == 0
      for: 2m
      labels:
        severity: {{ $sevWarn }}

    - alert: KubeScrapeTargetDown
      annotations:
        description: >
          Scrape target {{ "{{" }} $labels.job {{ "}}" }} instance {{ "{{" }} $labels.instance {{ "}}" }}
          has been down for 5m on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
          Immediate action required.
        summary: Scrape target persistently down ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.targets.scrapeTargetDown | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        up == 0
      for: 5m
      labels:
        severity: {{ $sevCrit }}

    - alert: KubeScrapeErrorRatioHigh
      annotations:
        description: >
          {{ "{{" }} printf "%.1f" $value {{ "}}" }}% of scrape targets are down
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
        summary: High scrape error ratio ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.targets.scrapeErrorRatio | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        (
          count by (cluster_region) (up == 0)
          /
          count by (cluster_region) (up)
        ) * 100 > {{ .Values.rules.targets.scrapeErrorRatioWarning }}
      for: 5m
      labels:
        severity: {{ $sevWarn }}

    - alert: KubeScrapeErrorRatioHigh
      annotations:
        description: >
          {{ "{{" }} printf "%.1f" $value {{ "}}" }}% of scrape targets are down
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
          Immediate action required.
        summary: Critical scrape error ratio ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.targets.scrapeErrorRatio | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        (
          count by (cluster_region) (up == 0)
          /
          count by (cluster_region) (up)
        ) * 100 > {{ .Values.rules.targets.scrapeErrorRatioCritical }}
      for: 5m
      labels:
        severity: {{ $sevCrit }}

    - alert: KubeHAProxyBackendDown
      annotations:
        description: >
          HAProxy backend {{ "{{" }} $labels.proxy {{ "}}" }} is down
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
        summary: HAProxy backend down ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.targets.haproxyBackendDown | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        haproxy_backend_status{status="DOWN"} == 1
      for: 2m
      labels:
        severity: {{ $sevWarn }}

    - alert: KubeHAProxyBackendDown
      annotations:
        description: >
          HAProxy backend {{ "{{" }} $labels.proxy {{ "}}" }} has been down for 5m
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
          Immediate action required.
        summary: HAProxy backend persistently down ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.targets.haproxyBackendDown | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        haproxy_backend_status{status="DOWN"} == 1
      for: 5m
      labels:
        severity: {{ $sevCrit }}

    - alert: KubeMongoDBExporterDown
      annotations:
        description: >
          MongoDB exporter instance {{ "{{" }} $labels.instance {{ "}}" }} is down
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
        summary: MongoDB exporter down ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.targets.mongodbExporterDown | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        mongodb_up == 0
      for: 2m
      labels:
        severity: {{ $sevWarn }}

    - alert: KubeMongoDBExporterDown
      annotations:
        description: >
          MongoDB exporter instance {{ "{{" }} $labels.instance {{ "}}" }} has been down for 5m
          on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
          Immediate action required.
        summary: MongoDB exporter persistently down ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.targets.mongodbExporterDown | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        mongodb_up == 0
      for: 5m
      labels:
        severity: {{ $sevCrit }}
{{- end }}
