{{- if .Values.rules.velero.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-velero
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-prometheus-rules.labels" . | nindent 4 }}
    gitops.jenkins-x.io/pipeline: namespaces
spec:
  groups:
  - name: kubernetes.velero
    rules:
    - alert: VeleroBackupStale
      annotations:
        description: >
          Velero schedule {{ "{{" }} $labels.schedule {{ "}}" }} last successful backup was
          {{ "{{" }} printf "%.1f" $value {{ "}}" }}h ago on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
          Backup may have been skipped or failed.
        summary: Velero backup stale ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.velero.backupStale | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        (
          time() - velero_backup_last_successful_timestamp{schedule!=""}
        ) / 3600 > {{ .Values.rules.velero.staleWarningHours }}
      for: 0m
      labels:
        severity: warning

    - alert: VeleroBackupStale
      annotations:
        description: >
          Velero schedule {{ "{{" }} $labels.schedule {{ "}}" }} last successful backup was
          {{ "{{" }} printf "%.1f" $value {{ "}}" }}h ago on cluster {{ "{{" }} $labels.cluster_region {{ "}}" }}.
          Immediate action required — multiple consecutive backup runs may have failed.
        summary: Velero backup critically stale ({{ "{{" }} $labels.cluster_region {{ "}}" }})
        {{- with (.Values.runbooks.velero.backupStale | default .Values.runbooks.default) }}
        runbook_url: {{ . }}
        {{- end }}
      expr: |-
        (
          time() - velero_backup_last_successful_timestamp{schedule!=""}
        ) / 3600 > {{ .Values.rules.velero.staleCriticalHours }}
      for: 0m
      labels:
        severity: wip
{{- end }}
