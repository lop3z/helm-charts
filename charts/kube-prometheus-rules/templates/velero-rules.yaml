{{- if .Values.rules.velero.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-velero
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-prometheus-rules.labels" . | nindent 4 }}
    gitops.jenkins-x.io/pipeline: namespaces
spec:
  groups:
  - name: kubernetes.velero
    rules:
    - alert: VeleroBackupStale
      annotations:
        description: >
          Velero schedule {{ "{{" }} $labels.schedule {{ "}}" }} last successful backup was
          {{ "{{" }} printf "%.1f" $value {{ "}}" }}h ago on cluster {{ .Values.clusterRegion }}.
          Backup may have been skipped or failed.
        summary: Velero backup stale ({{ .Values.clusterRegion }})
        {{- if .Values.runbooks.velero.backupStale }}
        runbook_url: {{ .Values.runbooks.velero.backupStale }}
        {{- end }}
      expr: |-
        (
          time() - velero_backup_last_successful_timestamp{
            schedule!="",
            cluster_region="{{ .Values.clusterRegion }}"
          }
        ) / 3600 > {{ .Values.rules.velero.staleWarningHours }}
      for: 0m
      labels:
        severity: warning
        cluster_region: {{ .Values.clusterRegion }}

    - alert: VeleroBackupStale
      annotations:
        description: >
          Velero schedule {{ "{{" }} $labels.schedule {{ "}}" }} last successful backup was
          {{ "{{" }} printf "%.1f" $value {{ "}}" }}h ago on cluster {{ .Values.clusterRegion }}.
          Immediate action required — multiple consecutive backup runs may have failed.
        summary: Velero backup critically stale ({{ .Values.clusterRegion }})
        {{- if .Values.runbooks.velero.backupStale }}
        runbook_url: {{ .Values.runbooks.velero.backupStale }}
        {{- end }}
      expr: |-
        (
          time() - velero_backup_last_successful_timestamp{
            schedule!="",
            cluster_region="{{ .Values.clusterRegion }}"
          }
        ) / 3600 > {{ .Values.rules.velero.staleCriticalHours }}
      for: 0m
      labels:
        severity: critical
        cluster_region: {{ .Values.clusterRegion }}
{{- end }}
