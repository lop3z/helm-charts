# Cluster region of the deploy target — used only as a metadata.labels.cluster_region tag
# on the PrometheusRule resource itself. Alert PromQL no longer filters by this value:
# the rules evaluate against every cluster_region present in the metric store and propagate
# the label from the firing series, so a single deployment on the observability cluster
# (Mimir host) covers all regions whose metrics are remote_written into it.
clusterRegion: ""

# Namespace to deploy PrometheusRule resources into
namespace: jx-observability

# Grafana dashboard — deploys a ConfigMap picked up by the Grafana sidecar
dashboard:
  enabled: true
  # Grafana folder name (matched via grafana_folder annotation)
  folder: Kubernetes

# Per-family rule configuration.
#
# Each family has two suppression flags:
#   warningSuppressed:  true → severity label becomes "wip_warning"  (silent)
#                       false → "warning"  (telegram + slack via alertmanager)
#   criticalSuppressed: true → severity label becomes "wip_critical" (silent)
#                       false → "critical" (telegram + slack + pagerduty)
#
# Defaults are `true` for both — every alert ships in draft mode and notifies nothing.
# Override per-family in the version stream / cluster repo to opt-in to notifications
# once you've validated the alert behaviour for your environment.
rules:
  pvc:
    enabled: true
    warningSuppressed: true
    criticalSuppressed: true
    # Warning: PVC capacity usage > warningThreshold %
    warningThreshold: 75
    # Critical: PVC capacity usage > criticalThreshold %
    criticalThreshold: 85
    # Warning: PVC inode usage > inodeWarningThreshold %
    inodeWarningThreshold: 75
    # Critical: PVC inode usage > inodeCriticalThreshold %
    inodeCriticalThreshold: 85
    # Warning: PVC predicted to be full within this many hours
    predictFullInHours: 96
    # PVC daily growth rate thresholds (%)
    growthRateWarning: 10
    growthRateCritical: 20

  node:
    enabled: true
    warningSuppressed: true
    criticalSuppressed: true
    # Memory usage thresholds (%)
    memoryWarningThreshold: 85
    memoryCriticalThreshold: 95
    # CPU usage thresholds (%)
    cpuWarningThreshold: 80
    cpuCriticalThreshold: 90
    # Root disk usage thresholds (%)
    diskWarningThreshold: 85
    diskCriticalThreshold: 95
    # Root filesystem inode usage thresholds (%)
    inodeWarningThreshold: 85
    inodeCriticalThreshold: 95
    # Normalized load (load15 / cpu_count) thresholds.
    # Using the 15-minute average smooths out short spikes that don't reflect
    # sustained pressure on the node.
    loadWarningRatio: 1.20
    loadCriticalRatio: 1.50

  workload:
    enabled: true
    warningSuppressed: true
    criticalSuppressed: true
    # Pod restart spike thresholds (count in 15m)
    podRestartWarningThreshold: 5
    podRestartCriticalThreshold: 10
    # Pod not-ready ratio thresholds (%)
    podNotReadyWarningThreshold: 10
    podNotReadyCriticalThreshold: 30
    # Deployment unavailable replica ratio thresholds (%)
    workloadUnavailableWarningThreshold: 10
    workloadUnavailableCriticalThreshold: 30
    # HPA maxed replicas thresholds (%)
    hpaMaxedWarningRatio: 90
    hpaMaxedCriticalRatio: 100

  kubeApi:
    enabled: true
    warningSuppressed: true
    criticalSuppressed: true
    # API server p99 latency thresholds (seconds)
    latencyWarningSeconds: 1.0
    latencyCriticalSeconds: 2.0
    # API server 5xx error ratio thresholds (%)
    errorRatioWarning: 3
    errorRatioCritical: 10
    # Job failure thresholds (count in 30m)
    jobFailedWarning: 1
    jobFailedCritical: 3
    # CronJob lateness thresholds (seconds past kube_cronjob_next_schedule_time —
    # period-agnostic: works for hourly, daily, weekly cronjobs alike).
    # Default: warn after 10m late, page after 30m late.
    cronJobLateWarningSeconds: 600
    cronJobLateCriticalSeconds: 1800

  targets:
    enabled: true
    warningSuppressed: true
    criticalSuppressed: true
    # Scrape error ratio thresholds (% of targets down)
    scrapeErrorRatioWarning: 5
    scrapeErrorRatioCritical: 20

  velero:
    enabled: true
    warningSuppressed: true
    criticalSuppressed: true
    # Hours since last successful backup before warning (default: 25h — 1h grace after daily schedule)
    staleWarningHours: 25
    # Hours since last successful backup before critical (default: 49h — missed 2 consecutive runs)
    staleCriticalHours: 49

  mimir:
    enabled: true
    warningSuppressed: true
    criticalSuppressed: true
    # Per-tenant series usage thresholds (% of max_global_series_per_user).
    perTenantSeriesWarningRatio: 80
    perTenantSeriesCriticalRatio: 90
    # Mimir tenant cap — MUST match max_global_series_per_user in the mimir-distributed
    # values.yaml.gotmpl. The alert divides by this number, so drift between this value
    # and Mimir's actual limit produces wrong percentages.
    maxGlobalSeriesPerUser: 5000000
    # Mimir distributor replication factor — MUST match distributor.ring.replicationFactor
    # in the mimir-distributed config. Active-series totals are divided by this to recover
    # the real per-tenant series count.
    replicationFactor: 3
    # Per-ingester instance-limit usage thresholds (% of cortex_ingester_instance_limits).
    # Only fire when ingester.instance_limits.max_series / max_tenants are explicitly set
    # in Mimir (default is 0 = unlimited, in which case these alerts are no-ops).
    ingesterSeriesWarningRatio: 80
    ingesterSeriesCriticalRatio: 90
    ingesterTenantsWarningRatio: 70
    ingesterTenantsCriticalRatio: 80
    # Drop-rate thresholds (samples/sec) for limit-related discards only — out-of-order
    # and too-old samples are excluded since they reflect client clock skew, not capacity.
    discardWarnRate: 0
    discardCritRate: 10

# Runbook URLs for each alert — set to your internal Notion/Confluence pages in the version stream.
# Leave empty ("") to omit the runbook_url annotation from the PrometheusRule.
runbooks:
  # Fallback URL used when a specific alert's runbook URL is not set.
  # Set this in the version stream to your general alerts runbook page.
  default: ""
  node:
    memoryHigh: ""
    cpuSaturation: ""
    filesystemAlmostFull: ""
    inodesSaturation: ""
    filesystemSpaceFillingUp: ""
    pressure: ""
    loadHigh: ""
  pvc:
    fillingUp: ""
    inodesFillingUp: ""
    fillingUpPredicted: ""
    errors: ""
    growthAbnormal: ""
  workload:
    podRestartSpike: ""
    podNotReady: ""
    workloadUnavailable: ""
    hpaMaxedReplicas: ""
  targets:
    scrapeTargetDown: ""
    scrapeErrorRatio: ""
    haproxyBackendDown: ""
    mongodbExporterDown: ""
  kubeApi:
    latencyHigh: ""
    errorRatioHigh: ""
    jobFailed: ""
    cronJobMissedSchedule: ""
  velero:
    backupStale: ""
  mimir:
    perTenantSeriesUsage: ""
    ingesterSeriesLimit: ""
    ingesterTenantsLimit: ""
    samplesDiscardedByLimits: ""
