# Generic NetBird DB-access chart. All cluster-specific values are supplied per cluster
# (via versionStream / jx-values) — defaults below are empty/placeholder.
#
# Access groups (e.g. netbird-clickhouse) are JWT-issued by NetBird from same-named Keycloak realm
# roles — this chart does NOT create them. Access is granted by per-resource policies (manual; see
# README). This chart manages only: the NetworkRouter (→ operator creates the routing-peer pod),
# the NetworkResources, and optional wrapper Services.

# NetBird DNS zone the router registers resources under (must already exist in the management).
dnsZone: ""

# Routing peer (one per namespace). The operator turns this CR into the routing-peer pod.
router:
  name: db-access-router
  logLevel: info

# NetworkResources to expose — one per entry. serviceRef = an in-cluster Service (its ClusterIP).
#   resources:
#     - { name: redis, serviceRef: redis-cluster }
resources: []

# Optional plain-ClusterIP wrappers (for in-cluster services that are NodePort/headless, or to scope
# ports). e.g.
#   - name: clickhouse-netbird
#     selector: { app.kubernetes.io/name: clickhouse, app.kubernetes.io/instance: clickhouse, app.kubernetes.io/component: clickhouse }
#     ports: [ { name: http, port: 8123 }, { name: tcp, port: 9000 } ]
clusterIpServices: []

# Optional selector-less Service + Endpoints (for OFF-cluster targets, e.g. external mongos). e.g.
#   - { name: mongo-netbird, portName: mongo, externalHost: 51.68.95.180, port: 27017 }
externalServices: []
