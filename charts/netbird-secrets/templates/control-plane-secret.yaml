apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.controlPlaneSecretName }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  # Resolved at admission by vault-secrets-webhook; consumed as env by management + relay.
{{- range $key, $ref := .Values.controlPlane }}
  {{ $key }}: {{ $ref }}
{{- end }}
